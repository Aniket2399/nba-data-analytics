name: 'nba_analytics'
version: '1.0.0'
config-version: 2

profile: 'nba_analytics'

model-paths: ["models"]
analysis-paths: ["analysis"]
test-paths: ["tests"]
data-paths: ["data"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"
  - "logs"

models:
  nba_analytics:
    staging:
      materialized: view
      meta:
        owner: 'analytics'

on-run-start:
  - "{{ log('Starting dbt run...', info=true) }}"

on-run-end:
  - "{{ log('dbt run complete!', info=true) }}"
