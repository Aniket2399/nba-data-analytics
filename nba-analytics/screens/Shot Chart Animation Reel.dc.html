<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/><link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/><style>:root{--bg:#0c0b09;--panel:#151410;--panel-2:#1d1c17;--ink:#f2f0ea;--muted:#8f8d85;--line:#2a2823;--accent:#ED5B2A;--accent-soft:rgba(237,91,42,.16)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:'Space Grotesk',system-ui,sans-serif;-webkit-font-smoothing:antialiased}.mono{font-family:'JetBrains Mono',monospace;font-feature-settings:"tnum" 1}.muted{color:var(--muted)}.reel{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px}.stage{width:560px;max-width:100%}.head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}.pname{font-size:20px;font-weight:600;letter-spacing:-.01em;transition:opacity .3s ease}.pteam{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--accent)}.panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px}.bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}.title{font-size:15px;font-weight:600}.chips{display:flex;gap:6px}.chip{font-family:'JetBrains Mono',monospace;font-size:12px;padding:6px 13px;border-radius:9px;border:1px solid var(--line);background:var(--panel-2);color:var(--muted);transition:all .25s ease}.chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}.court{width:100%;height:auto;display:block;border-radius:10px}.court-line{fill:none;stroke:rgba(242,240,234,.22);stroke-width:2}.court-paint{fill:rgba(237,91,42,.07);stroke:rgba(242,240,234,.22);stroke-width:2}.court-rim{fill:none;stroke:var(--accent);stroke-width:2.5}.court-board{stroke:var(--accent);stroke-width:3;stroke-linecap:round}.planks line{stroke:rgba(242,240,234,.035);stroke-width:1}.legend{display:flex;align-items:center;justify-content:center;gap:18px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);margin-top:12px}.lg-ring{width:12px;height:12px;border-radius:50%;border:2px solid var(--ink);display:inline-block}.cap{margin-top:18px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.06em;color:var(--muted)}.cap b{color:var(--accent);font-weight:600}.dots{display:flex;gap:6px;justify-content:center;margin-top:12px}.dot{width:6px;height:6px;border-radius:50%;background:var(--line);transition:all .25s ease}.dot.on{background:var(--accent);width:18px;border-radius:3px}</style></helmet><div class="reel"><div class="stage"><div class="head"><div class="fx ac gap10"><span class="pname">{{playerName}}</span><span class="pteam">{{playerTeam}}</span></div><span class="mono muted" style="font-size:12px">AUTO-PLAY REEL</span></div><div class="panel"><div class="bar"><div class="title">Shot Chart</div><div class="chips"><sc-for list="{{chips}}" as="c" hint-placeholder-count="4"><span class="{{c.cls}}">{{c.label}}</span></sc-for></div></div><svg viewBox="0 0 500 330" class="court"><defs><linearGradient id="floor" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#17150f"></stop><stop offset="1" stop-color="#0d0c09"></stop></linearGradient><radialGradient id="rimglow" cx="0.5" cy="0.16" r="0.55"><stop offset="0" stop-color="#ED5B2A" stop-opacity="0.18"></stop><stop offset="1" stop-color="#ED5B2A" stop-opacity="0"></stop></radialGradient></defs><rect x="2" y="2" width="496" height="326" rx="8" fill="url(#floor)"></rect><g class="planks"><line x1="58" y1="2" x2="58" y2="328"></line><line x1="114" y1="2" x2="114" y2="328"></line><line x1="170" y1="2" x2="170" y2="328"></line><line x1="226" y1="2" x2="226" y2="328"></line><line x1="274" y1="2" x2="274" y2="328"></line><line x1="330" y1="2" x2="330" y2="328"></line><line x1="386" y1="2" x2="386" y2="328"></line><line x1="442" y1="2" x2="442" y2="328"></line></g><rect x="2" y="2" width="496" height="326" rx="8" fill="url(#rimglow)"></rect><rect x="2" y="2" width="496" height="326" rx="8" class="court-line"></rect><rect x="170" y="2" width="160" height="188" class="court-paint"></rect><circle cx="250" cy="190" r="60" class="court-line"></circle><path d="M212 52 A 38 38 0 0 0 288 52" class="court-line"></path><line x1="214" y1="40" x2="286" y2="40" class="court-board"></line><circle cx="250" cy="52" r="8" class="court-rim"></circle><line x1="250" y1="40" x2="250" y2="48" class="court-rim"></line><line x1="30" y1="2" x2="30" y2="140" class="court-line"></line><line x1="470" y1="2" x2="470" y2="140" class="court-line"></line><path d="M30 140 A 237.5 237.5 0 0 0 470 140" class="court-line"></path><path d="M190 328 A 60 60 0 0 1 310 328" class="court-line"></path><g>{{markers}}</g></svg><div class="legend"><span class="fx ac gap6"><span class="lg-ring"></span>Make</span><span class="fx ac gap6"><span style="font-weight:700;color:var(--ink)">×</span>Miss</span><span class="fx ac gap6"><span style="width:10px;height:10px;border-radius:50%;background:var(--accent);display:inline-block"></span>Highlighted zone</span></div></div><div class="cap">Now showing: <b>{{capLabel}}</b></div><div class="dots"><sc-for list="{{dots}}" as="d" hint-placeholder-count="4"><span class="{{d.cls}}"></span></sc-for></div></div></div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:640,&quot;height&quot;:640}}">
class Component extends DCLogic {
  constructor(props){
    super(props);
    this.A='#ED5B2A';
    this.players=[
      {key:'embiid',name:'Joel Embiid',team:'PHI'},
      {key:'curry',name:'Stephen Curry',team:'GSW'},
      {key:'giannis',name:'Giannis Antetokounmpo',team:'MIL'}
    ];
    this.filters=['all','rim','mid','3pt'];
    this.filterLabels={all:'ALL ZONES',rim:'RIM',mid:'MID-RANGE','3pt':'3-POINT'};
    this._shots={};
    this.state={ p:0, f:0 };
  }
  componentDidMount(){
    this.timer=setInterval(()=>{
      this.setState(s=>{
        let f=s.f+1, p=s.p;
        if(f>=this.filters.length){ f=0; p=(p+1)%this.players.length; }
        return {f,p};
      });
    },1500);
  }
  componentWillUnmount(){ clearInterval(this.timer); }
  seedStr(s){ let h=2166136261; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=(h*16777619)>>>0; } return h>>>0; }
  rng(seed){ let s=seed%2147483647; if(s<=0)s+=2147483646; return ()=>{ s=(s*16807)%2147483647; return (s-1)/2147483646; }; }
  clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
  getShots(key){ if(this._shots[key])return this._shots[key]; const r=this.rng(this.seedStr(key)+99); const zones=[{g:'rim',n:13,cx:250,cy:58,sx:28,sy:20,p:0.63},{g:'rim',n:6,cx:250,cy:120,sx:72,sy:42,p:0.46},{g:'mid',n:11,cx:250,cy:175,sx:150,sy:50,p:0.41},{g:'3pt',n:3,cx:50,cy:75,sx:14,sy:55,p:0.39},{g:'3pt',n:3,cx:450,cy:75,sx:14,sy:55,p:0.39},{g:'3pt',n:10,cx:250,cy:255,sx:180,sy:38,p:0.37}]; const out=[]; let id=0; zones.forEach(z=>{ for(let i=0;i<z.n;i++){ const cx=this.clamp(z.cx+(r()*2-1)*z.sx,12,488); const cy=this.clamp(z.cy+(r()*2-1)*z.sy,14,308); out.push({id:id++,g:z.g,cx:+cx.toFixed(1),cy:+cy.toFixed(1),made:r()<z.p}); } }); this._shots[key]=out; return out; }
  makeMarkers(shots,filter){ const acc=this.A; const emph=filter!=='all'; const els=[]; shots.forEach(s=>{ const active=filter==='all'?true:s.g===filter; const dim=emph&&!active; const hot=active&&emph; const color=hot?acc:'#b8b5ac'; const op=dim?0.1:(active?1:0.8); const st={transition:'all .45s cubic-bezier(.4,0,.2,1)'}; if(s.made){ els.push(React.createElement('circle',{key:s.id,cx:s.cx,cy:s.cy,r:6,fill:hot?'rgba(237,91,42,0.16)':'none',stroke:color,strokeWidth:2,opacity:op,style:st})); } else { els.push(React.createElement('path',{key:s.id,d:'M '+(s.cx-5)+' '+(s.cy-5)+' L '+(s.cx+5)+' '+(s.cy+5)+' M '+(s.cx+5)+' '+(s.cy-5)+' L '+(s.cx-5)+' '+(s.cy+5),stroke:color,strokeWidth:2,fill:'none',opacity:op,style:st})); } }); return els; }
  renderVals(){
    const S=this.state; const player=this.players[S.p]; const filter=this.filters[S.f];
    return {
      playerName:player.name, playerTeam:player.team,
      chips:this.filters.map((f,i)=>({label:f.toUpperCase(),cls:i===S.f?'chip on':'chip'})),
      markers:this.makeMarkers(this.getShots(player.key),filter),
      capLabel:this.filterLabels[filter],
      dots:this.filters.map((f,i)=>({cls:i===S.f?'dot on':'dot'}))
    };
  }
}
</script>
</body>
</html>
